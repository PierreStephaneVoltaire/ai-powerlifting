name: health
description: >
  Sports scientist toolset for powerlifting program management. Exclusively available to
  powerlifting_coach and health_write specialists. Provides: training session CRUD (get,
  create, update, delete, reschedule), program metadata and phases, competition management,
  block goals, federation and qualifying-standard management, attempt calculation, supplement
  protocol, diet notes, IPF weight classes, RPE/e1RM calculations, weekly training analysis,
  exercise ROI correlation analysis, fatigue profile estimation, and IPF rulebook semantic
  search. Also owns no-data user onboarding setup and first-block initialization.
version: 1.0.0
scope: specialist
execution: in_process
