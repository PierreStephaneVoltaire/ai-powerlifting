layers:
- pl_boto3
- pl_glossary
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 900
description: Search exercises by substring across name/description/muscles.
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: Partition key (defaults to env HEALTH_PROGRAM_PK).
    query:
      type: string
      description: Substring to search for (empty returns all).
  required: []

reserved_concurrency: null