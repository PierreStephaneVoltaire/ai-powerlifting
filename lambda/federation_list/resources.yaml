layers:
- pl_boto3
- pl_federation
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
timeout: 30
description: Return the global federation library for a user (entries + standards).
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: Partition key (defaults to env HEALTH_PROGRAM_PK).
  required: []

reserved_concurrency: null
