layers:
- pl-ai
memory: 512
timeout: 900
s3_read: false
reserved_concurrency: 5
description: Review a squat, bench, or deadlift style profile and return missing biomechanical details needed to estimate a lift-specific INOL stimulus coefficient.
input_schema:
  type: object
  properties:
    profile:
      type: object
      description: Lift profile with lift, style_notes, sticking_points, primary_muscle, and volume_tolerance.
  required:
  - profile
