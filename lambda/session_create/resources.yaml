layers:
- pl_boto3
- pl_sessions
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
timeout: 900
description: Create a new training session for the current program.
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: Partition key (defaults to env HEALTH_PROGRAM_PK).
    program_sk:
      type: string
      description: Optional program SK; defaults to the current program pointer.
    session:
      type: object
      description: Raw session body.
  required: []

reserved_concurrency: null
