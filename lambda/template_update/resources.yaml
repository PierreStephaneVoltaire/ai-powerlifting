layers:
- pl_boto3
- pl_templates
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 900
description: Overwrite an existing training template in place (metadata, phases, sessions).
input_schema:
  type: object
  properties:
    sk:
      type: string
    template:
      type: object
    actor_pk:
      type: string
      description: Signed-in user/template author partition
  required:
  - sk
  - template

reserved_concurrency: null
