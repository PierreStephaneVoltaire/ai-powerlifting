layers:
- pl_boto3
memory: 256
timeout: 900
description: Remove a weight entry by date from the weight log.
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: Partition key (defaults to env HEALTH_PROGRAM_PK).
    version:
      type: string
      description: Program version key suffix (defaults to "current").
    date:
      type: string
      description: Date of the entry to remove (YYYY-MM-DD).
  required:
  - date

reserved_concurrency: null