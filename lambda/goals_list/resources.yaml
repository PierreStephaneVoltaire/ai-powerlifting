layers:
- pl_boto3
- pl_goals
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 900
description: List all athlete goals for a user (separate from program-block goals).
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: Partition key (defaults to env HEALTH_PROGRAM_PK).
  required: []

reserved_concurrency: null
