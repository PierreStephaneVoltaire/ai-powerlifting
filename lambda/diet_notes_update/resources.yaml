layers:
- pl_boto3
memory: 256
timeout: 60
description: Replace the diet notes array for a program version.
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: Partition key (defaults to env HEALTH_PROGRAM_PK).
    version:
      type: string
      description: Program version key suffix (defaults to "current").
    notes:
      type: array
      description: List of diet note dicts.
  required:
  - notes

reserved_concurrency: null
