layers:
- pl_boto3
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 60
description: Append a max entry to the max history for a program version.
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: Partition key (defaults to env HEALTH_PROGRAM_PK).
    version:
      type: string
      description: Program version key suffix (defaults to "current").
    entry:
      type: object
      description: Max entry with required `date` (YYYY-MM-DD) and `squat_kg`, `bench_kg`, `deadlift_kg`.
    date:
      type: string
      description: Convenience top-level alias for entry.date.
    squat_kg:
      type: number
    bench_kg:
      type: number
    deadlift_kg:
      type: number
    total_kg:
      type: number
  required: []

reserved_concurrency: null
