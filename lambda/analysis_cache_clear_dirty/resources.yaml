layers:
- pl_boto3
- pl_analysis_cache
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 60
description: Delete the dirty marker for a user's markdown export.
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: User partition key (defaults to env HEALTH_PROGRAM_PK).
    block_key:
      type: string
      description: Block key (defaults to "current").
      default: current
  required: []

reserved_concurrency: null
