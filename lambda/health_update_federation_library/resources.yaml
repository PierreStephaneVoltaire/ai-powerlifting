layers:
- pl_boto3
- pl_federation
- pl_program
- pl_sessions
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 900
description: Replace the shared federation-library document.
input_schema:
  type: object
  properties:
    federations:
      type: array
      items:
        type: object
      description: Complete federation records array
    qualification_standards:
      type: array
      items:
        type: object
      description: Complete qualification standards array
  required:
  - federations
  - qualification_standards

reserved_concurrency: null
