layers:
- pl_boto3
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 900
description: Update ranking country/region for a user.
input_schema:
  type: object
  properties:
    username:
      type: string
      description: Discord username of the user.
    ranking_country:
      type: string
      description: Country (string or null).
    ranking_region:
      type: string
      description: Region (string or null).
  required:
  - username

reserved_concurrency: null