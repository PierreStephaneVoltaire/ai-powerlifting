layers:
- pl_boto3
- pl_federation_library
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 60
description: Get the per-user federation library (list of federation entries).
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: User partition key (defaults to env HEALTH_PROGRAM_PK).
  required: []

reserved_concurrency: null
