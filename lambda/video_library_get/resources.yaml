layers:
- pl_boto3
- pl_sessions
min_replicas: 1
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 1
    memory: 1Gi
timeout: 900
description: Get the video library across sessions with optional exercise filter.
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: Partition key (defaults to env HEALTH_PROGRAM_PK).
    version:
      type: string
      description: Program version key suffix (defaults to "current").
    exercise:
      type: string
      description: Filter videos by exercise_name.
    sort:
      type: string
      description: 'newest | oldest | volume | weight (defaults to newest)'
  required: []

reserved_concurrency: null