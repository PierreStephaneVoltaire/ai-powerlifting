layers:
- pl_boto3
- pl_analysis_cache
memory: 256
timeout: 60
description: Get the cached markdown export for the user's current (or past) block.
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: User partition key (defaults to env HEALTH_PROGRAM_PK).
    block_key:
      type: string
      description: Block key (defaults to "current").
      default: current
  required: []

reserved_concurrency: null
