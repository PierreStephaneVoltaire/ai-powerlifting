layers:
- pl_boto3
- pl_templates
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 900
description: Create a new blank training template with no sessions.
input_schema:
  type: object
  properties:
    name:
      type: string
    description:
      type: string
      default: ''
    estimated_weeks:
      type: integer
      default: 4
    days_per_week:
      type: integer
      default: 3
    actor_pk:
      type: string
      description: Signed-in user/template author partition
    author:
      type: string
      description: Display author
  required:
  - name

reserved_concurrency: null
