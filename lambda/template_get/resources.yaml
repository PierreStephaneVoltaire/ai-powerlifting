layers:
- pl_boto3
- pl_templates
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 900
description: Get full training template structure.
input_schema:
  type: object
  properties:
    sk:
      type: string
    actor_pk:
      type: string
      description: Signed-in user/template author partition for draft visibility
  required:
  - sk

reserved_concurrency: null
