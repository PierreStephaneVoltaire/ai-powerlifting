layers:
- pl_boto3
- pl_program
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
timeout: 900
description: Unarchive a program version.
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: Partition key (defaults to env HEALTH_PROGRAM_PK).
    program_sk:
      type: string
      description: Optional program SK; defaults to the current program pointer.
  required: []
reserved_concurrency: null
