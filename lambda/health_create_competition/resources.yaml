layers:
- pl_boto3
- pl_program
- pl_sessions
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 900
description: Create a new competition entry.
input_schema:
  type: object
  properties:
    competition:
      type: object
      description: 'Competition dict: name, date, federation, federation_id, counts_toward_federation_ids, status, weight_class_kg, location, targets, notes'
  required:
  - competition

reserved_concurrency: null
