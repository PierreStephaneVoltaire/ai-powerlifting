layers:
- pl_boto3
- pl_program
- pl_sessions
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 900
description: Create a new training session.
input_schema:
  type: object
  properties:
    date:
      type: string
      description: Session date (YYYY-MM-DD)
    day:
      type: string
      description: Day label e.g. Monday
    week_number:
      type: integer
      description: Training week number
    exercises:
      type: array
      items:
        type: object
      description: Optional list of exercises
    session_notes:
      type: string
      description: Optional session notes
      default: ''
  required:
  - date
  - day
  - week_number

reserved_concurrency: null
