layers:
- pl_boto3
- pl_budget
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 900
description: Create a new budget item.
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: Partition key (defaults to env HEALTH_PROGRAM_PK).
    item:
      type: object
      description: Raw budget item body.
  required:
  - item

reserved_concurrency: null