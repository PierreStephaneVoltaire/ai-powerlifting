layers:
- pl_boto3
- pl_program
- pl_sessions
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 900
description: Update competition fields by date.
input_schema:
  type: object
  properties:
    date:
      type: string
      description: Competition date to update (YYYY-MM-DD)
    patch:
      type: object
      description: Fields to update (targets, status, notes, etc.)
  required:
  - date
  - patch

reserved_concurrency: null
