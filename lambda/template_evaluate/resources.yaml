layers:
- pl_ai
- pl_boto3
- pl_program
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi
timeout: 900
s3_read: false
reserved_concurrency: 5
description: Run AI-powered template evaluation.
input_schema:
  type: object
  properties:
    sk:
      type: string
    actor_pk:
      type: string
      description: Signed-in user/template author partition for draft visibility
  required:
  - sk