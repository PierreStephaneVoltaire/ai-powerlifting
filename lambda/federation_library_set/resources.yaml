layers:
- pl_boto3
- pl_federation_library
memory: 256
timeout: 60
description: Replace the per-user federation library entries.
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: User partition key (defaults to env HEALTH_PROGRAM_PK).
    entries:
      type: array
      description: List of federation library entries (each with federation_slug, display_name, parent_slug, qualifying_standards).
  required:
  - entries

reserved_concurrency: null
