layers:
- pl_boto3
- pl_program
- pl_sessions
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 900
description: Update the supplement protocol.
input_schema:
  type: object
  properties:
    patch:
      type: object
      description: '{"supplements": [...]} or {"supplement_phases": [...]}'
  required:
  - patch

reserved_concurrency: null
