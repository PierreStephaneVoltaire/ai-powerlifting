layers:
- pl_ai
- pl_boto3
- pl_glossary
- pl_program
- pl_templates
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
timeout: 900
description: Training template management pod. Handles template CRUD (create blank,
  from block, from payload, get, list, update, copy, archive, unarchive), publishing
  workflow (publish, unpublish), template evaluation, and template application (apply
  initiates, apply_confirm executes). Pass the operation name in the "function" field
  and all operation arguments as top-level fields alongside it.
input_schema:
  type: object
  properties:
    function:
      type: string
      description: The operation to dispatch to. See the operations field for available
        operations and their individual schemas.
      enum:
      - template_apply
      - template_apply_confirm
      - template_archive
      - template_copy
      - template_create_blank
      - template_create_from_block
      - template_create_from_payload
      - template_evaluate
      - template_get
      - template_list
      - template_publish
      - template_unarchive
      - template_unpublish
      - template_update
    pk: &id001
      type: string
    template_sk: &id002
      type: string
    start_date: &id003
      type: string
    maxes: &id004
      type: object
    preview_id: &id005
      type: string
    new_name: &id006
      type: string
    name: &id007
      type: string
    weeks: &id008
      type: integer
    block: &id009
      type: object
    payload: &id010
      type: object
    include_archived: &id011
      type: boolean
    updates: &id012
      type: object
  required:
  - function
operations:
  template_apply:
    description: template_apply
    input_schema:
      type: object
      properties:
        pk: *id001
        template_sk: *id002
        start_date: *id003
        maxes: *id004
      required: []
  template_apply_confirm:
    description: template_apply_confirm
    input_schema:
      type: object
      properties:
        pk:
          type: string
        preview_id: *id005
      required: []
  template_archive:
    description: template_archive
    input_schema:
      type: object
      properties:
        pk:
          type: string
        template_sk:
          type: string
      required: []
  template_copy:
    description: template_copy
    input_schema:
      type: object
      properties:
        pk:
          type: string
        template_sk:
          type: string
        new_name: *id006
      required: []
  template_create_blank:
    description: template_create_blank
    input_schema:
      type: object
      properties:
        pk:
          type: string
        name: *id007
        weeks: *id008
      required: []
  template_create_from_block:
    description: template_create_from_block
    input_schema:
      type: object
      properties:
        pk:
          type: string
        block: *id009
        name:
          type: string
      required: []
  template_create_from_payload:
    description: template_create_from_payload
    input_schema:
      type: object
      properties:
        pk:
          type: string
        payload: *id010
      required: []
  template_evaluate:
    description: template_evaluate
    input_schema:
      type: object
      properties:
        pk:
          type: string
        template_sk:
          type: string
        maxes:
          type: object
      required: []
  template_get:
    description: template_get
    input_schema:
      type: object
      properties:
        pk:
          type: string
        template_sk:
          type: string
      required: []
  template_list:
    description: template_list
    input_schema:
      type: object
      properties:
        pk:
          type: string
        include_archived: *id011
      required: []
  template_publish:
    description: template_publish
    input_schema:
      type: object
      properties:
        pk:
          type: string
        template_sk:
          type: string
      required: []
  template_unarchive:
    description: template_unarchive
    input_schema:
      type: object
      properties:
        pk:
          type: string
        template_sk:
          type: string
      required: []
  template_unpublish:
    description: template_unpublish
    input_schema:
      type: object
      properties:
        pk:
          type: string
        template_sk:
          type: string
      required: []
  template_update:
    description: template_update
    input_schema:
      type: object
      properties:
        pk:
          type: string
        template_sk:
          type: string
        updates: *id012
      required: []
