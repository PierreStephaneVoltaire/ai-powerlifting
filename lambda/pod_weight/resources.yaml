layers:
- pl_boto3
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
timeout: 900
description: Weight log pod. Handles weight entry add/remove and weight log add/get/remove.
  Low volume, read-then-write. Pass the operation name in the "function" field and
  all operation arguments as top-level fields alongside it.
input_schema:
  type: object
  properties:
    function:
      type: string
      description: The operation to dispatch to. See the operations field for available
        operations and their individual schemas.
      enum:
      - weight_add_entry
      - weight_get_log
      - weight_log_add
      - weight_log_get
      - weight_log_remove
      - weight_remove_entry
    pk: &id001
      type: string
    version: &id002
      type: string
    entry: &id003
      type: object
    date: &id004
      type: string
    weight_kg: &id005
      type: number
  required:
  - function
  - date
  - entry
operations:
  weight_add_entry:
    description: weight_add_entry
    input_schema:
      type: object
      properties:
        pk: *id001
        version: *id002
        entry: *id003
      required:
      - entry
  weight_get_log:
    description: weight_get_log
    input_schema:
      type: object
      properties:
        pk:
          type: string
        version:
          type: string
      required: []
  weight_log_add:
    description: weight_log_add
    input_schema:
      type: object
      properties:
        pk:
          type: string
        version:
          type: string
        entry:
          type: object
        date: *id004
        weight_kg: *id005
      required: []
  weight_log_get:
    description: weight_log_get
    input_schema:
      type: object
      properties:
        pk:
          type: string
        version:
          type: string
      required: []
  weight_log_remove:
    description: weight_log_remove
    input_schema:
      type: object
      properties:
        pk:
          type: string
        version:
          type: string
        date:
          type: string
      required:
      - date
  weight_remove_entry:
    description: weight_remove_entry
    input_schema:
      type: object
      properties:
        pk:
          type: string
        version:
          type: string
        date:
          type: string
      required:
      - date
