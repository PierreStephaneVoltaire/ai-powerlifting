layers:
- pl-ai
- pl-boto3
- pl-program
memory: 512
timeout: 900
s3_read: false
reserved_concurrency: 5
description: Estimate the primary, secondary, and tertiary muscle groups for an exercise using AI analysis of the movement and the user's lift profiles.
input_schema:
  type: object
  properties:
    exercise:
      type: object
      description: Exercise metadata dict
      properties:
        name:
          type: string
        category:
          type: string
        equipment:
          type: string
        primary_muscles:
          type: array
          items:
            type: string
        secondary_muscles:
          type: array
          items:
            type: string
        tertiary_muscles:
          type: array
          items:
            type: string
        description:
          type: string
        how_to_perform:
          type: string
        why_do_it:
          type: string
    lift_profiles:
      type: array
      description: Optional squat/bench/deadlift lift profiles to pass through to the estimator
      items:
        type: object
        properties:
          lift:
            type: string
          style_notes:
            type: string
          sticking_points:
            type: string
          primary_muscle:
            type: string
          volume_tolerance:
            type: string
  required:
  - exercise