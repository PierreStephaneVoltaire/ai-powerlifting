layers:
- pl_boto3
- pl_budget
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 900
description: Upsert the budget config for a user.
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: Partition key (defaults to env HEALTH_PROGRAM_PK).
    config:
      type: object
      description: 'Config body: {monthly_cap, currency, notes}'
  required:
  - config

reserved_concurrency: null