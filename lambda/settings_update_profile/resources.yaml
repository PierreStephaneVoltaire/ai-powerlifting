layers:
- pl_boto3
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 900
description: Update profile fields (visibility, display_name, bio, summary flag).
input_schema:
  type: object
  properties:
    username:
      type: string
      description: Discord username of the user.
    profile_visibility:
      type: string
      description: 'private | public'
    display_name:
      type: string
    bio:
      type: string
    public_training_summary_enabled:
      type: boolean
  required:
  - username

reserved_concurrency: null