layers:
- pl_boto3
memory: 256
timeout: 60
description: Replace the supplement phases array for a program version.
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: Partition key (defaults to env HEALTH_PROGRAM_PK).
    version:
      type: string
      description: Program version key suffix (defaults to "current").
    phases:
      type: array
      description: List of supplement phase dicts.
  required:
  - phases

reserved_concurrency: null
