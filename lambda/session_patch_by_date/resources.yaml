layers:
- pl_boto3
- pl_sessions
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
timeout: 900
description: Patch a session by date (finds by date, no index).
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: Partition key (defaults to env HEALTH_PROGRAM_PK).
    program_sk:
      type: string
      description: Optional program SK; defaults to the current program pointer.
    date:
      type: string
    patch:
      type: object
  required: []

reserved_concurrency: null
