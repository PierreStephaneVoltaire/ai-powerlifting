layers:
- pl_boto3
- pl_federation
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 60
description: "Admin in-place update of a single master federation item (FED#masterId)."
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: Partition key (defaults to env HEALTH_PROGRAM_PK).
    master_id:
      type: string
    updates:
      type: object
  required: []
reserved_concurrency: null
