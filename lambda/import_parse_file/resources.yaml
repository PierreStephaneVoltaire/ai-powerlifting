layers:
- pl_ai
- pl_boto3
- pl_program
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 1024Mi
timeout: 900
s3_read: false
reserved_concurrency: 3
description: Parse a spreadsheet file and stage it as a pending import.
input_schema:
  type: object
  properties:
    base64_content:
      type: string
    filename:
      type: string
  required:
  - base64_content
  - filename