layers:
- pl_boto3
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 900
description: Build the current user's profile (by mapped_pk) with program + videos.
input_schema:
  type: object
  properties:
    mapped_pk:
      type: string
      description: Mapped partition key (defaults to 'operator').
    viewer_username:
      type: string
      description: Discord username of the requesting user.
  required: []

reserved_concurrency: null