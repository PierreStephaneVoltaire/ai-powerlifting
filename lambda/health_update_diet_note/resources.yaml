layers:
- pl_boto3
- pl_program
memory: 256
timeout: 900
description: Create or replace a diet note for a date.
input_schema:
  type: object
  properties:
    date:
      type: string
      description: Date for the diet note (YYYY-MM-DD)
    notes:
      type: string
      description: The diet notes content
  required:
  - date
  - notes

reserved_concurrency: null
