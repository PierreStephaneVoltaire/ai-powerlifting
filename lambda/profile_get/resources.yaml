layers:
- pl_boto3
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 900
description: Build a public profile by nickname with program + videos.
input_schema:
  type: object
  properties:
    nickname:
      type: string
      description: Profile nickname to look up.
    viewer_username:
      type: string
      description: Discord username of the requesting user.
  required:
  - nickname

reserved_concurrency: null