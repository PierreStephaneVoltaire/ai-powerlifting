layers:
- pl_ai
- pl_boto3
- pl_program
memory: 512
timeout: 900
s3_read: false
reserved_concurrency: 5
description: Estimate a 1-2 INOL stimulus coefficient from an existing lift profile. Requires profile completeness score >= 55.
input_schema:
  type: object
  properties:
    profile:
      type: object
      description: Lift profile with lift, style_notes, sticking_points, primary_muscle, and volume_tolerance.
  required:
  - profile
