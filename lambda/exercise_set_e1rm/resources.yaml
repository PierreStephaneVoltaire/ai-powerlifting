layers:
- pl_boto3
- pl_glossary
memory: 256
timeout: 900
description: Set an e1rm estimate on an exercise (mirrors setE1rmEstimate).
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: Partition key (defaults to env HEALTH_PROGRAM_PK).
    id:
      type: string
      description: Exercise id.
    value_kg:
      type: number
      description: Estimated 1-rep max in kilograms.
    method:
      type: string
      description: 'manual | ai_backfill | logged (defaults to manual)'
  required:
  - id
  - value_kg

reserved_concurrency: null