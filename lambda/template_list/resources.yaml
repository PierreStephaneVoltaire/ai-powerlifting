layers:
- pl_boto3
- pl_templates
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 900
description: List all training templates.
input_schema:
  type: object
  properties:
    include_archived:
      type: boolean
      default: false
    actor_pk:
      type: string
      description: Signed-in user/template author partition for draft visibility
  required: []

reserved_concurrency: null
