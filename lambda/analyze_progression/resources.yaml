layers:
- pl_boto3
- pl_program
- pl_sessions
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 750m
    memory: 512Mi
timeout: 900
description: Calculate weekly progression rate (kg/week) for a lift via Theil-Sen regression on top sets. Returns slope, Kendall tau, fit quality, and data points.
input_schema:
  type: object
  properties:
    exercise_name:
      type: string
      description: Name of the exercise
    weeks:
      type: integer
      description: Number of recent weeks to analyze
  required:
  - exercise_name

reserved_concurrency: null
