layers:
- pl_boto3
- pl_sessions
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 900
description: Update a video's thumbnail s3 key and status.
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: Partition key (defaults to env HEALTH_PROGRAM_PK).
    version:
      type: string
      description: Program version key suffix (defaults to "current").
    session_date:
      type: string
      description: Session date (YYYY-MM-DD).
    video_id:
      type: string
      description: Video id to update.
    thumbnail_s3_key:
      type: string
      description: S3 key of the generated thumbnail.
    status:
      type: string
      description: 'ready | failed'
  required:
  - session_date
  - video_id
  - thumbnail_s3_key
  - status

reserved_concurrency: null