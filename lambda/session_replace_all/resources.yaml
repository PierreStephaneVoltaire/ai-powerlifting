layers:
- pl_boto3
- pl_sessions
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
timeout: 900
description: Replace all sessions for a program version (used by program fork).
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: Partition key (defaults to env HEALTH_PROGRAM_PK).
    program_sk:
      type: string
      description: Optional program SK; defaults to the current program pointer.
    sessions:
      type: array
  required: []

reserved_concurrency: null
