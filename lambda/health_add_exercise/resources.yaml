layers:
- pl_boto3
- pl_program
- pl_sessions
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 900
description: Add an exercise to a training session.
input_schema:
  type: object
  properties:
    date:
      type: string
      description: Session date (YYYY-MM-DD)
    exercise:
      type: object
      description: 'Exercise dict: {name, sets, reps, kg, rpe, notes}'
  required:
  - date
  - exercise

reserved_concurrency: null
