layers:
- pl_boto3
- pl_glossary
memory: 256
timeout: 900
description: Remove an exercise from the glossary by id.
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: Partition key (defaults to env HEALTH_PROGRAM_PK).
    id:
      type: string
      description: Exercise id to remove.
  required:
  - id

reserved_concurrency: null