layers:
- pl_boto3
- pl_program
- pl_sessions
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 900
description: Get competition details by date.
input_schema:
  type: object
  properties:
    date:
      type: string
      description: Competition date (YYYY-MM-DD)
  required:
  - date

reserved_concurrency: null
