layers:
- pl_boto3
- pl_glossary
memory: 256
timeout: 900
description: Insert or update an exercise in the glossary by id.
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: Partition key (defaults to env HEALTH_PROGRAM_PK).
    exercise:
      type: object
      description: 'Exercise dict: {id?, name, primary_muscles, ...}'
  required:
  - exercise

reserved_concurrency: null