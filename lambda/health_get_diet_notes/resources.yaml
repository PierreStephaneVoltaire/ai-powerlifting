layers:
- pl_boto3
- pl_program
- pl_sessions
memory: 256
timeout: 900
description: Get diet notes for a date range.
input_schema:
  type: object
  properties:
    start_date:
      type: string
      description: Start of date range (YYYY-MM-DD)
    end_date:
      type: string
      description: End of date range (YYYY-MM-DD)
  required: []

reserved_concurrency: null
