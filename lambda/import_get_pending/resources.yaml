layers:
- pl_boto3
- pl_imports
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 900
description: Get a single pending import by ID.
input_schema:
  type: object
  properties:
    import_id:
      type: string
  required:
  - import_id

reserved_concurrency: null
