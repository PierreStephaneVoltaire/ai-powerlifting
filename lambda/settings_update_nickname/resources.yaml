layers:
- pl_boto3
memory: 256
timeout: 900
description: Update the nickname for a user.
input_schema:
  type: object
  properties:
    username:
      type: string
      description: Discord username of the user.
    nickname:
      type: string
      description: New nickname (2-32 lowercase alphanumeric/hyphen/underscore).
  required:
  - username
  - nickname

reserved_concurrency: null