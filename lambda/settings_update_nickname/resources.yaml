layers:
- pl_boto3
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 900
description: Update the nickname for a user.
input_schema:
  type: object
  properties:
    username:
      type: string
      description: Discord username of the user.
    nickname:
      type: string
      description: New nickname (2-32 lowercase alphanumeric/hyphen/underscore).
  required:
  - username
  - nickname

reserved_concurrency: null