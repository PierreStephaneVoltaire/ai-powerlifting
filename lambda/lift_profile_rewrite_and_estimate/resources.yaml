layers:
- pl-ai
memory: 1024
timeout: 900
s3_read: false
reserved_concurrency: 5
description: Rewrite a lift style profile for analysis clarity and estimate a 1-2 INOL stimulus coefficient against a baseline of 1.0.
input_schema:
  type: object
  properties:
    profile:
      type: object
      description: Lift profile with lift, style_notes, sticking_points, primary_muscle, and volume_tolerance.
  required:
  - profile
