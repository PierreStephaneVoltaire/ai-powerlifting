layers:
- pl_boto3
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 750m
    memory: 512Mi
timeout: 900
description: Upload a profile avatar to S3 and set avatar_url.
input_schema:
  type: object
  properties:
    username:
      type: string
      description: Discord username of the user.
    file_b64:
      type: string
      description: Base64-encoded avatar image bytes.
    mimetype:
      type: string
      description: MIME type of the avatar (e.g. image/jpeg).
    filename:
      type: string
      description: Original filename (used for extension fallback).
    mapped_pk:
      type: string
      description: Mapped partition key (owner segment for S3 key).
  required:
  - username
  - file_b64
  - mimetype

reserved_concurrency: null