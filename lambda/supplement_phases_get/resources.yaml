layers:
- pl_boto3
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
timeout: 60
description: Get the supplement phases array for a program version.
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: Partition key (defaults to env HEALTH_PROGRAM_PK).
    version:
      type: string
      description: Program version key suffix (defaults to "current").
  required: []

reserved_concurrency: null
