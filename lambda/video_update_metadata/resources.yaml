layers:
- pl_boto3
- pl_sessions
memory: 256
timeout: 900
description: Update metadata (exercise_name/set_number/notes) on a session video.
input_schema:
  type: object
  properties:
    pk:
      type: string
      description: Partition key (defaults to env HEALTH_PROGRAM_PK).
    version:
      type: string
      description: Program version key suffix (defaults to "current").
    session_date:
      type: string
      description: Session date (YYYY-MM-DD).
    video_id:
      type: string
      description: Video id to update.
    exercise_name:
      type: string
    set_number:
      type: number
    notes:
      type: string
  required:
  - session_date
  - video_id

reserved_concurrency: null