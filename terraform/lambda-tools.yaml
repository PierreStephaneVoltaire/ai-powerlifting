# Phase 3 Lambda tool configuration — source of truth for the 76 health lambdas.
#
# Adding a tool = add one entry here. No Terraform edits required.
# The Terraform (lambda.tf) reads this file with yamldecode(file("lambda-tools.yaml"))
# and generates one aws_lambda_function per entry via for_each.
#
# Fields per tool:
#   layers  : list of layer keys (map to aws_lambda_layer_version.*.arn in lambda.tf)
#             - pl_boto3, pl_pandas, pl_program, pl_sessions, pl_glossary,
#               pl_templates, pl_imports, pl_federation, pl_analysis_cache
#             - [] for pure-math lambdas (no layer)
#   memory  : Lambda memory in MB
#             128  = pure-math (no deps, stdlib only)
#             256  = lightweight DynamoDB CRUD (single-table reads/writes)
#             512  = DynamoDB analytics / multi-table loads / stats (pandas) / export generation
#   timeout : 900 (AWS max — per the migration plan rule; do not shorten)
#   s3_read : true if the lambda reads the OpenPowerlifting S3 dataset (stats Stream B)
#
# Layer assignments are copied verbatim from HEALTH_LAMBDA_MIGRATION_PLAN.md Phase 1
# checkboxes (the "layers: pl-boto3+pl-..." notes).

# ---------------------------------------------------------------------------
# Stream A — Pure math (no DynamoDB, no pandas, NO layer)
# ---------------------------------------------------------------------------
kg_to_lb:
  layers: []
  memory: 128
  timeout: 900
lb_to_kg:
  layers: []
  memory: 128
  timeout: 900
ipf_weight_classes:
  layers: []
  memory: 128
  timeout: 900
