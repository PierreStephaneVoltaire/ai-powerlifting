
<style>
.bio-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);margin-bottom:10px;overflow:hidden}
.bio-head{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary)}
.bio-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;padding:12px 16px 4px}
.bio-grid-2{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 16px 12px}
.inp-label{font-size:10px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:3px;display:flex;align-items:center;gap:3px}
.seg{display:flex;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden}
.seg-btn{flex:1;padding:5px 6px;font-size:11px;font-family:var(--font-sans);cursor:pointer;border:none;background:transparent;color:var(--color-text-secondary);transition:background 80ms,color 80ms}
.seg-btn.on{background:var(--color-background-success);color:var(--color-text-success)}
</style>

<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
  <div>
    <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:2px;">Log / Biometrics</div>
    <div style="font-size:20px;font-weight:500;color:var(--color-text-primary);">Biometrics</div>
    <div style="font-size:12px;color:var(--color-text-secondary);">Track weekly nutrition, sleep, and recovery metrics</div>
  </div>
  <button onclick="addEntry()" style="display:flex;align-items:center;gap:5px;padding:6px 12px;font-size:12px;font-family:var(--font-sans);cursor:pointer;border-radius:var(--border-radius-md);background:var(--color-background-info);color:var(--color-text-info);border:0.5px solid var(--color-border-info);">
    <i class="ti ti-plus" style="font-size:13px" aria-hidden="true"></i> Add entry
  </button>
</div>

<div id="entries"></div>

<script>
const ENTRIES = [
  {id:1,date:'2026-05-20',cal:'1560',pro:'82',carbs:'144',fat:'79',sleep:'3',water:'2',waterUnit:'L',consistency:'consistent',note:''},
  {id:2,date:'2026-05-17',cal:'1000',pro:'',carbs:'',fat:'',sleep:'9',water:'1',waterUnit:'L',consistency:'consistent',note:''},
  {id:3,date:'2026-05-15',cal:'1300',pro:'',carbs:'',fat:'',sleep:'3',water:'1',waterUnit:'L',consistency:'consistent',note:''},
  {id:4,date:'2026-04-29',cal:'110',pro:'90',carbs:'32',fat:'30',sleep:'4',water:'3',waterUnit:'L',consistency:'consistent',note:''},
];

let nextId = 5;

function toggleConsistency(id, btn) {
  const e = ENTRIES.find(e=>e.id===id);
  const seg = btn.closest('.seg');
  const btns = seg.querySelectorAll('.seg-btn');
  btns.forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  e.consistency = btn.dataset.val;
}

function deleteEntry(id) {
  const idx = ENTRIES.findIndex(e=>e.id===id);
  if(idx>-1) ENTRIES.splice(idx,1);
  render();
}

function addEntry() {
  const today = new Date().toISOString().split('T')[0];
  ENTRIES.unshift({id:nextId++,date:today,cal:'',pro:'',carbs:'',fat:'',sleep:'',water:'',waterUnit:'L',consistency:'consistent',note:''});
  render();
}

function render() {
  document.getElementById('entries').innerHTML = ENTRIES.map(e => {
    const isOn = e.consistency === 'on-off';
    return `
    <div class="bio-card">
      <div class="bio-head">
        <div style="display:flex;align-items:center;gap:8px;">
          <i class="ti ti-calendar" style="font-size:13px;color:var(--color-text-secondary)" aria-hidden="true"></i>
          <input type="date" value="${e.date}" style="font-size:13px;font-family:var(--font-mono);background:transparent;border:none;color:var(--color-text-primary);outline:none;cursor:pointer;">
        </div>
        <button onclick="deleteEntry(${e.id})" style="background:transparent;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:14px;display:flex;align-items:center;" aria-label="Delete entry">
          <i class="ti ti-trash" aria-hidden="true"></i>
        </button>
      </div>

      <div class="bio-grid">
        <div>
          <div class="inp-label"><i class="ti ti-flame" style="font-size:10px" aria-hidden="true"></i> Calories</div>
          <input type="number" value="${e.cal}" placeholder="e.g. 2800" style="width:100%;box-sizing:border-box;font-size:13px;font-family:var(--font-mono);">
        </div>
        <div>
          <div class="inp-label"><i class="ti ti-fish" style="font-size:10px" aria-hidden="true"></i> Protein (g)</div>
          <input type="number" value="${e.pro}" placeholder="e.g. 180" style="width:100%;box-sizing:border-box;font-size:13px;font-family:var(--font-mono);">
        </div>
        <div>
          <div class="inp-label">Carbs (g)</div>
          <input type="number" value="${e.carbs}" placeholder="e.g. 250" style="width:100%;box-sizing:border-box;font-size:13px;font-family:var(--font-mono);">
        </div>
        <div>
          <div class="inp-label">Fat (g)</div>
          <input type="number" value="${e.fat}" placeholder="e.g. 80" style="width:100%;box-sizing:border-box;font-size:13px;font-family:var(--font-mono);">
        </div>
      </div>

      <div class="bio-grid-2">
        <div>
          <div class="inp-label"><i class="ti ti-moon" style="font-size:10px" aria-hidden="true"></i> Sleep (hrs)</div>
          <input type="number" value="${e.sleep}" placeholder="e.g. 7" step="0.5" style="width:100%;box-sizing:border-box;font-size:13px;font-family:var(--font-mono);">
        </div>
        <div>
          <div class="inp-label"><i class="ti ti-droplet" style="font-size:10px" aria-hidden="true"></i> Water intake</div>
          <div style="display:flex;gap:5px;">
            <input type="number" value="${e.water}" placeholder="0" style="flex:1;box-sizing:border-box;font-size:13px;font-family:var(--font-mono);">
            <select style="font-size:12px;padding:4px 6px;"><option${e.waterUnit==='L'?' selected':''}>L</option><option${e.waterUnit==='fl oz'?' selected':''}>fl oz</option></select>
          </div>
        </div>
        <div>
          <div class="inp-label">Nutrition consistency</div>
          <div class="seg">
            <button class="seg-btn${!isOn?' on':''}" data-val="consistent" onclick="toggleConsistency(${e.id},this)">Consistent</button>
            <button class="seg-btn${isOn?' on':''}" data-val="on-off" onclick="toggleConsistency(${e.id},this)">On &amp; Off</button>
          </div>
        </div>
        <div style="grid-column:1/-1;">
          <div class="inp-label">Notes</div>
          <textarea placeholder="Observations, how you felt..." style="width:100%;box-sizing:border-box;font-size:12px;font-family:var(--font-sans);min-height:36px;resize:none;background:transparent;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:6px 10px;color:var(--color-text-secondary);">${e.note}</textarea>
        </div>
      </div>
    </div>`;
  }).join('');
}

render();
</script>
