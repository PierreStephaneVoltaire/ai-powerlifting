
<style>
.phase-row{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px;transition:border-color 100ms}
.phase-row:hover{border-color:var(--color-border-secondary)}
.phase-meta{font-size:12px;color:var(--color-text-secondary);display:flex;gap:10px;flex-wrap:wrap;margin-top:3px}
.phase-intent{font-size:12px;color:var(--color-text-secondary);margin-top:4px;font-style:italic}
.icon-btn{background:transparent;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:15px;padding:3px;display:flex;align-items:center;transition:color 100ms}
.icon-btn:hover{color:var(--color-text-primary)}
.icon-btn.danger:hover{color:var(--color-text-danger)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:22px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto}
.inp-label{font-size:10px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:3px}
.phase-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0;margin-top:2px}
</style>

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
  <div>
    <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:2px;">Designer / Phase Design</div>
    <div style="font-size:20px;font-weight:500;color:var(--color-text-primary);">Phase Design</div>
  </div>
  <div style="display:flex;gap:6px;align-items:center;">
    <select style="font-size:12px;padding:5px 8px;border-radius:var(--border-radius-md);">
      <option>Current block</option><option>All blocks</option>
    </select>
    <button onclick="openAdd()" style="display:flex;align-items:center;gap:5px;padding:6px 12px;font-size:12px;font-family:var(--font-sans);cursor:pointer;border-radius:var(--border-radius-md);background:var(--color-background-info);color:var(--color-text-info);border:0.5px solid var(--color-border-info);">
      <i class="ti ti-plus" style="font-size:13px" aria-hidden="true"></i> Add phase
    </button>
  </div>
</div>

<div id="phase-list"></div>
<div id="modal-root"></div>

<script>
function hashColor(name){
  let h=0;
  for(let i=0;i<name.length;i++) h=(h*31+name.charCodeAt(i))&0xffffffff;
  const hue=Math.abs(h)%360;
  return{dot:`hsl(${hue},60%,55%)`,bg:`hsl(${hue},55%,20%)`,text:`hsl(${hue},65%,72%)`};
}

const PHASES=[
  {id:1,name:'Warmup',w1:1,w2:1,rpeMin:3,rpeMax:4,days:4,intent:'Baseline pattern groove',notes:''},
  {id:2,name:'Base Build',w1:2,w2:4,rpeMin:3,rpeMax:6,days:4,intent:'Progressive overload, volume accumulation',notes:''},
  {id:3,name:'Intensification',w1:5,w2:7,rpeMin:6,rpeMax:8,days:4,intent:'Volume drops, loads climb toward near-max',notes:''},
  {id:4,name:'Rebuild',w1:6,w2:9,rpeMin:6,rpeMax:8,days:4,intent:'Progressive rebuild to comp maxes',notes:''},
  {id:5,name:'Modified Smolov Jr',w1:10,w2:12,rpeMin:8,rpeMax:10,days:4,intent:'Ramp up bench volume (drastic increase in volume)',notes:''},
  {id:6,name:'Intensification II',w1:13,w2:14,rpeMin:8,rpeMax:9,days:3,intent:'Deadlift emphasis. Bench unchanged. Squat hits/maintains 190-200, then volume drops.',notes:''},
  {id:7,name:'Deload',w1:15,w2:15,rpeMin:4,rpeMax:7,days:2,intent:'convention/break',notes:''},
  {id:8,name:'Intensification III',w1:16,w2:19,rpeMin:9,rpeMax:10,days:3,intent:'Practice singles',notes:''},
  {id:9,name:'Taper (HS)',w1:20,w2:20,rpeMin:4,rpeMax:7,days:4,intent:'Peak for Horseshow Showdown',notes:''},
  {id:10,name:'Comp (Horseshow Showdown)',w1:21,w2:21,rpeMin:10,rpeMax:10,days:1,intent:'Competition day',notes:''},
];
let nextId=11;
let editing=null;

function openEdit(id){
  editing=id;
  const p=PHASES.find(p=>p.id===id);
  renderModal(p,false);
}
function openAdd(){
  editing=null;
  renderModal({id:null,name:'',w1:'',w2:'',rpeMin:'',rpeMax:'',days:'',intent:'',notes:''},true);
}
function closeModal(){
  document.getElementById('modal-root').innerHTML='';
}
function saveModal(){
  const name=document.getElementById('m-name').value.trim();
  const w1=parseInt(document.getElementById('m-w1').value)||1;
  const w2=parseInt(document.getElementById('m-w2').value)||1;
  const rpeMin=parseInt(document.getElementById('m-rpemin').value)||0;
  const rpeMax=parseInt(document.getElementById('m-rpemax').value)||10;
  const days=parseInt(document.getElementById('m-days').value)||3;
  const intent=document.getElementById('m-intent').value.trim();
  const notes=document.getElementById('m-notes').value.trim();
  if(!name) return;
  if(editing){
    const p=PHASES.find(p=>p.id===editing);
    Object.assign(p,{name,w1,w2,rpeMin,rpeMax,days,intent,notes});
  } else {
    PHASES.push({id:nextId++,name,w1,w2,rpeMin,rpeMax,days,intent,notes});
  }
  closeModal();
  render();
}
function deletePhase(id){
  const idx=PHASES.findIndex(p=>p.id===id);
  if(idx>-1) PHASES.splice(idx,1);
  render();
}

function renderModal(p,isNew){
  document.getElementById('modal-root').innerHTML=`
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
        <span style="font-size:16px;font-weight:500;color:var(--color-text-primary);">${isNew?'Add phase':'Edit phase'}</span>
        <button onclick="closeModal()" style="background:transparent;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:18px;"><i class="ti ti-x" aria-hidden="true"></i></button>
      </div>
      <div style="margin-bottom:12px;">
        <div class="inp-label">Name</div>
        <input id="m-name" type="text" value="${p.name}" placeholder="e.g. Base Build" style="width:100%;box-sizing:border-box;font-size:13px;">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
        <div><div class="inp-label">Start week</div><input id="m-w1" type="number" value="${p.w1}" placeholder="1" style="width:100%;box-sizing:border-box;font-size:13px;font-family:var(--font-mono);"></div>
        <div><div class="inp-label">End week</div><input id="m-w2" type="number" value="${p.w2}" placeholder="4" style="width:100%;box-sizing:border-box;font-size:13px;font-family:var(--font-mono);"></div>
      </div>
      <div style="margin-bottom:12px;">
        <div class="inp-label">Intent</div>
        <textarea id="m-intent" style="width:100%;box-sizing:border-box;font-size:13px;font-family:var(--font-sans);min-height:60px;resize:none;" placeholder="What is this phase trying to accomplish?">${p.intent}</textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;">
        <div><div class="inp-label">RPE min</div><input id="m-rpemin" type="number" min="1" max="10" value="${p.rpeMin}" style="width:100%;box-sizing:border-box;font-size:13px;font-family:var(--font-mono);text-align:center;"></div>
        <div><div class="inp-label">RPE max</div><input id="m-rpemax" type="number" min="1" max="10" value="${p.rpeMax}" style="width:100%;box-sizing:border-box;font-size:13px;font-family:var(--font-mono);text-align:center;"></div>
        <div><div class="inp-label">Days/week</div><input id="m-days" type="number" min="1" max="7" value="${p.days}" style="width:100%;box-sizing:border-box;font-size:13px;font-family:var(--font-mono);text-align:center;"></div>
      </div>
      <div style="margin-bottom:18px;">
        <div class="inp-label">Notes</div>
        <textarea id="m-notes" style="width:100%;box-sizing:border-box;font-size:13px;font-family:var(--font-sans);min-height:56px;resize:none;" placeholder="Additional notes...">${p.notes}</textarea>
      </div>
      <div style="display:flex;align-items:center;justify-content:flex-end;gap:8px;">
        <button onclick="closeModal()" style="padding:6px 14px;font-size:13px;font-family:var(--font-sans);cursor:pointer;border-radius:var(--border-radius-md);">Cancel</button>
        <button onclick="saveModal()" style="padding:6px 14px;font-size:13px;font-family:var(--font-sans);cursor:pointer;border-radius:var(--border-radius-md);background:var(--color-background-info);color:var(--color-text-info);border:0.5px solid var(--color-border-info);display:flex;align-items:center;gap:5px;">
          <i class="ti ti-device-floppy" style="font-size:13px" aria-hidden="true"></i> ${isNew?'Add phase':'Update phase'}
        </button>
      </div>
    </div>
  </div>`;
}

function render(){
  document.getElementById('phase-list').innerHTML=PHASES.map((p,i)=>{
    const c=hashColor(p.name);
    return`<div class="phase-row">
      <div class="phase-num" style="background:${c.bg};color:${c.text};">${i+1}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:15px;font-weight:500;color:var(--color-text-primary);">${p.name}</div>
        <div class="phase-meta">
          <span>W${p.w1}–W${p.w2}</span>
          <span>RPE ${p.rpeMin}–${p.rpeMax}</span>
          <span>${p.days}×/week</span>
        </div>
        ${p.intent?`<div class="phase-intent">${p.intent}</div>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:4px;flex-shrink:0;">
        <button style="display:flex;align-items:center;gap:4px;padding:4px 10px;font-size:12px;font-family:var(--font-sans);cursor:pointer;border-radius:var(--border-radius-md);">
          <i class="ti ti-calendar" style="font-size:12px" aria-hidden="true"></i> Sessions
        </button>
        <button class="icon-btn" onclick="openEdit(${p.id})" aria-label="Edit phase"><i class="ti ti-edit" aria-hidden="true"></i></button>
        <button class="icon-btn danger" onclick="deletePhase(${p.id})" aria-label="Delete phase"><i class="ti ti-trash" aria-hidden="true"></i></button>
      </div>
    </div>`;
  }).join('');
}
render();
</script>
