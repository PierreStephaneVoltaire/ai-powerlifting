
<style>
*{box-sizing:border-box}
.page{font-family:var(--font-sans)}
.breadcrumb{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.breadcrumb span{color:var(--color-text-primary)}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.page-title{font-size:22px;font-weight:600;color:var(--color-text-primary)}
.top-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.week-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.week-nav{display:flex;align-items:center;gap:6px}
.btn{padding:5px 12px;font-size:12px;font-family:var(--font-sans);cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:5px;white-space:nowrap}
.btn-primary{background:var(--color-background-info);color:var(--color-text-info);border:0.5px solid var(--color-border-info)}
.btn-ghost{background:transparent;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary)}
.btn-ghost:hover{border-color:var(--color-border-secondary);color:var(--color-text-primary)}
.week-selector{padding:4px 10px;font-size:13px;font-family:var(--font-mono);background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:6px;color:var(--color-text-primary)}
.vol-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:10px;padding:14px 16px;margin-bottom:12px}
.vol-title{font-size:13px;font-weight:500;color:var(--color-text-primary);display:flex;align-items:center;gap:6px;margin-bottom:12px}
.vol-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.vol-label{font-size:12px;color:var(--color-text-secondary);width:90px;flex-shrink:0}
.vol-bar-wrap{flex:1;height:5px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden}
.vol-count{font-size:11px;font-family:var(--font-mono);color:var(--color-text-secondary);width:60px;text-align:right;flex-shrink:0}
.sess-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.sess-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:10px;padding:14px 16px;cursor:pointer;transition:border-color 100ms}
.sess-card:hover{border-color:var(--color-border-secondary)}
.sess-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.sess-day{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.sess-date{font-size:12px;color:var(--color-text-secondary);font-family:var(--font-mono);margin-bottom:12px}
.status-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;letter-spacing:0.05em;text-transform:uppercase}
.ex-line{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.ex-line-name{font-size:13px;color:var(--color-text-primary)}
.ex-line-sets{font-size:12px;color:var(--color-text-secondary);font-family:var(--font-mono);text-align:right}
.logged{font-size:11px;color:var(--color-text-secondary);margin-top:10px;padding-top:8px;border-top:0.5px solid var(--color-border-tertiary)}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:10px;width:480px;max-width:100%;max-height:90vh;display:flex;flex-direction:column}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:0.5px solid var(--color-border-tertiary)}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.modal-foot{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:0.5px solid var(--color-border-tertiary);flex-wrap:wrap;gap:8px}
.inp-label{font-size:10px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:3px}
.pill-tag{font-size:10px;font-weight:600;padding:3px 9px;border-radius:4px;letter-spacing:0.06em;text-transform:uppercase}
.ex-block{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:8px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.drag-h{color:var(--color-text-secondary);font-size:16px;cursor:grab;flex-shrink:0;opacity:0.5}
.ex-block-name{flex:1;font-size:13px;font-weight:500;color:var(--color-text-primary)}
.num-inp{width:40px;font-size:13px;font-family:var(--font-mono);text-align:center;padding:4px 2px;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:4px}
.w-inp{width:56px;font-size:13px;font-family:var(--font-mono);text-align:center;padding:4px 2px;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:4px}
.at{font-size:12px;color:var(--color-text-secondary);flex-shrink:0}
.arr-btn{background:transparent;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:13px;padding:1px;flex-shrink:0;display:flex;align-items:center}
.arr-btn:hover{color:var(--color-text-primary)}
.del-btn{background:transparent;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:13px;padding:1px;flex-shrink:0;display:flex;align-items:center}
.del-btn:hover{color:var(--color-text-danger)}
.search-wrap{position:relative}
.search-dd{position:absolute;top:calc(100% + 2px);left:0;right:0;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:6px;z-index:10;max-height:160px;overflow-y:auto}
.dd-item{padding:8px 12px;font-size:13px;cursor:pointer;color:var(--color-text-primary);display:flex;justify-content:space-between;align-items:center}
.dd-item:hover{background:var(--color-background-secondary)}
.dd-cat{font-size:11px;color:var(--color-text-secondary)}
</style>

<div class="page">
<div class="breadcrumb">Designer / <span>Session Design</span></div>
<div class="top-bar">
  <div class="page-title">Session Design</div>
  <div class="top-right">
    <button class="btn btn-ghost" onclick=""><i class="ti ti-copy" aria-hidden="true"></i> Copy Previous</button>
    <button class="btn btn-ghost" onclick=""><i class="ti ti-copy" aria-hidden="true"></i> Copy Next</button>
    <button class="btn btn-primary" onclick="openModal(null)"><i class="ti ti-plus" aria-hidden="true"></i> Add Session</button>
  </div>
</div>

<div class="week-bar">
  <div class="week-nav">
    <button class="btn btn-ghost"><i class="ti ti-arrow-left" aria-hidden="true"></i> Prev Week</button>
    <button class="btn btn-ghost">Next Week <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
  </div>
  <select class="week-selector">
    <option>Week 14</option><option>Week 13</option><option>Week 15</option>
  </select>
</div>

<div class="vol-card">
  <div class="vol-title"><i class="ti ti-chart-bar" aria-hidden="true"></i> Planned Weekly Volume</div>
  <div id="vol-bars"></div>
</div>

<div class="sess-grid" id="sess-grid"></div>
<div id="modal-root"></div>
</div>

<script>
const VOL=[
  {m:'Glutes',s:19,max:20,c:'hsl(214,70%,55%)'},
  {m:'Erectors',s:19,max:20,c:'hsl(214,70%,55%)'},
  {m:'Quads',s:17,max:20,c:'hsl(214,70%,55%)'},
  {m:'Hamstrings',s:16.5,max:20,c:'hsl(214,70%,55%)'},
  {m:'Traps',s:16,max:20,c:'hsl(214,70%,55%)'},
  {m:'Squat',s:5,max:20,c:'hsl(142,60%,45%)'},
  {m:'Bench',s:3,max:20,c:'hsl(142,60%,45%)'},
  {m:'Deadlift',s:12,max:20,c:'hsl(142,60%,45%)'},
];

const SESSIONS=[
  {id:1,day:'Saturday',date:'2026-05-16',status:'completed',
   exs:[{n:'Squat',sets:'1x1 @162.5 kg\n1x1 @180 kg\n1x1 @190 kg'},{n:'Bench Press',sets:'1x1 @112.5 kg\n1x1 @115 kg\n1x1 @117.5 kg'},{n:'Good Morning',sets:'2x8 @88.45 kg'}],
   rows:[{id:1,n:'Squat',s:1,r:1,w:162.5},{id:2,n:'Squat',s:1,r:1,w:180},{id:3,n:'Squat',s:1,r:1,w:190},{id:4,n:'Bench Press',s:1,r:1,w:112.5},{id:5,n:'Bench Press',s:1,r:1,w:115},{id:6,n:'Bench Press',s:1,r:1,w:117.5},{id:7,n:'Good Morning',s:2,r:8,w:88.45}],logged:8},
  {id:2,day:'Sunday',date:'2026-05-17',status:'completed',
   exs:[{n:'Spoto Press',sets:'1x6 @81.5 kg'},{n:'Deadlift',sets:'1x1 @70 kg\n3x2 @166 kg\n2x2 @176 kg'},{n:'Pin Squat',sets:'2x1 @147.418 kg'}],
   rows:[{id:8,n:'Spoto Press',s:1,r:6,w:81.5},{id:9,n:'Deadlift',s:1,r:1,w:70},{id:10,n:'Deadlift',s:3,r:2,w:166},{id:11,n:'Deadlift',s:2,r:2,w:176},{id:12,n:'Pin Squat',s:2,r:1,w:147.4}],logged:5},
  {id:3,day:'Tuesday',date:'2026-05-19',status:'completed',
   exs:[{n:'Pause Bench Press',sets:'2x5 @86.5 kg'},{n:'Chest Supported Row',sets:'2x6 @118.297 kg'}],
   rows:[{id:13,n:'Pause Bench Press',s:2,r:5,w:86.5},{id:14,n:'Chest Supported Row',s:2,r:6,w:118.3}],logged:2},
  {id:4,day:'Wednesday',date:'2026-05-20',status:'completed',
   exs:[{n:'Deadlift',sets:'1x1 @70 kg\n1x1 @120 kg\n1x1 @170 kg\n1x1 @185 kg\n1x1 @205 kg\n1x1 @220 kg'}],
   rows:[{id:15,n:'Deadlift',s:1,r:1,w:70},{id:16,n:'Deadlift',s:1,r:1,w:120},{id:17,n:'Deadlift',s:1,r:1,w:170},{id:18,n:'Deadlift',s:1,r:1,w:185},{id:19,n:'Deadlift',s:1,r:1,w:205},{id:20,n:'Deadlift',s:1,r:1,w:220}],logged:11},
  {id:5,day:'Thursday',date:'2026-05-21',status:'planned',
   exs:[{n:'Close Grip Bench Press',sets:'1x4 @92 kg'},{n:'Cable Rows',sets:'2x8 @95.254 kg'},{n:'Reverse Cable Flyes',sets:'2x10 @72.575 kg'},{n:'Shoulder DB Flys',sets:'2x7 @9.072 kg'}],
   rows:[{id:21,n:'Close Grip Bench Press',s:1,r:4,w:92},{id:22,n:'Cable Rows',s:2,r:8,w:95.25},{id:23,n:'Reverse Cable Flyes',s:2,r:10,w:72.6},{id:24,n:'Shoulder DB Flys',s:2,r:7,w:9.1}],logged:5},
];

const LIB=[
  {n:'Squat',c:'Squat'},{n:'Pause Squat',c:'Squat'},{n:'Pin Squat',c:'Squat'},{n:'SBB Squat',c:'Squat'},
  {n:'Bench Press',c:'Bench'},{n:'Pause Bench Press',c:'Bench'},{n:'Close Grip Bench Press',c:'Bench'},{n:'Spoto Press',c:'Bench'},{n:'Floor Press',c:'Bench'},
  {n:'Deadlift',c:'Deadlift'},{n:'Stiff Leg Deadlift',c:'Deadlift'},{n:'Hex Bar RDL',c:'Deadlift'},
  {n:'Good Morning',c:'Back'},{n:'Pendlay Row',c:'Back'},{n:'Weighted Pull-ups',c:'Back'},{n:'Cable Rows',c:'Back'},{n:'Chest Supported Row',c:'Back'},
  {n:'Leg Press',c:'Legs'},{n:'Single-Leg Leg Press',c:'Legs'},{n:'Pullover',c:'Chest'},{n:'Shrugs',c:'Back'},
];

let editRows=[];
let editSessId=null;
let nextRowId=100;

function statusPill(s){
  if(s==='completed') return`<span class="status-pill" style="background:var(--color-background-success);color:var(--color-text-success);">Completed</span>`;
  if(s==='planned') return`<span class="status-pill" style="background:var(--color-background-info);color:var(--color-text-info);">Planned</span>`;
  return`<span class="status-pill" style="background:var(--color-background-secondary);color:var(--color-text-secondary);">Draft</span>`;
}

function renderVol(){
  document.getElementById('vol-bars').innerHTML=VOL.map(v=>`
    <div class="vol-row">
      <span class="vol-label">${v.m}</span>
      <div class="vol-bar-wrap"><div style="height:5px;width:${v.s/v.max*100}%;background:${v.c};border-radius:3px;"></div></div>
      <span class="vol-count">${v.s} sets</span>
    </div>`).join('');
}

function renderGrid(){
  document.getElementById('sess-grid').innerHTML=SESSIONS.map(s=>`
    <div class="sess-card" onclick="openModal(${s.id})">
      <div class="sess-head">
        <span class="sess-day">${s.day}</span>
        ${statusPill(s.status)}
      </div>
      <div class="sess-date">${s.date}</div>
      <div>
        ${s.exs.map(e=>`
          <div class="ex-line">
            <span class="ex-line-name">${e.n}</span>
            <span class="ex-line-sets" style="white-space:pre-line;">${e.sets}</span>
          </div>`).join('')}
      </div>
      <div class="logged">${s.logged} exercises logged</div>
    </div>`).join('');
}

function openModal(sessId){
  editSessId=sessId;
  const sess=sessId?SESSIONS.find(s=>s.id===sessId):null;
  editRows=sess?JSON.parse(JSON.stringify(sess.rows)):[];
  renderModal(sess);
}

function closeModal(){document.getElementById('modal-root').innerHTML='';}

function moveRow(idx,dir){
  const to=idx+dir;
  if(to<0||to>=editRows.length)return;
  [editRows[idx],editRows[to]]=[editRows[to],editRows[idx]];
  renderModal(editSessId?SESSIONS.find(s=>s.id===editSessId):null);
}

function delRow(idx){
  editRows.splice(idx,1);
  renderModal(editSessId?SESSIONS.find(s=>s.id===editSessId):null);
}

function addRowFromSearch(){
  const inp=document.getElementById('ex-search-inp');
  const val=inp?inp.value.trim():'';
  if(!val)return;
  editRows.push({id:nextRowId++,n:val,s:1,r:3,w:''});
  renderModal(editSessId?SESSIONS.find(s=>s.id===editSessId):null);
  setTimeout(()=>{
    const inp=document.getElementById('ex-search-inp');
    if(inp)inp.focus();
    const list=document.getElementById('modal-ex-list');
    if(list)list.scrollTop=list.scrollHeight;
  },30);
}

function pickFromDD(name){
  editRows.push({id:nextRowId++,n:name,s:1,r:3,w:''});
  renderModal(editSessId?SESSIONS.find(s=>s.id===editSessId):null);
  setTimeout(()=>{
    const list=document.getElementById('modal-ex-list');
    if(list)list.scrollTop=list.scrollHeight;
  },30);
}

function filterDD(q){
  const dd=document.getElementById('ex-dd');
  if(!q.trim()){dd.innerHTML='';return;}
  const res=LIB.filter(e=>e.n.toLowerCase().includes(q.toLowerCase())).slice(0,8);
  dd.innerHTML=res.map(e=>`<div class="dd-item" onclick="pickFromDD('${e.n}')"><span>${e.n}</span><span class="dd-cat">${e.c}</span></div>`).join('');
}

function renderModal(sess){
  const isNew=!sess;
  const rows=editRows.map((r,i)=>`
    <div class="ex-block">
      <i class="ti ti-grip-vertical drag-h" aria-hidden="true"></i>
      <span class="ex-block-name">${r.n}</span>
      <input class="num-inp" type="number" min="1" value="${r.s}" onchange="editRows[${i}].s=+this.value" title="Sets">
      <span class="at">×</span>
      <input class="num-inp" type="number" min="1" value="${r.r}" onchange="editRows[${i}].r=+this.value" title="Reps">
      <span class="at">@</span>
      <input class="w-inp" type="number" value="${r.w}" placeholder="kg" onchange="editRows[${i}].w=+this.value" title="Weight">
      <button class="arr-btn" onclick="moveRow(${i},-1)" ${i===0?'style="opacity:0.25"':''} title="Move up"><i class="ti ti-chevron-up" aria-hidden="true"></i></button>
      <button class="arr-btn" onclick="moveRow(${i},1)" ${i===editRows.length-1?'style="opacity:0.25"':''} title="Move down"><i class="ti ti-chevron-down" aria-hidden="true"></i></button>
      <button class="del-btn" onclick="delRow(${i})" aria-label="Remove"><i class="ti ti-trash" aria-hidden="true"></i></button>
    </div>`).join('');

  document.getElementById('modal-root').innerHTML=`
  <div class="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-head">
        <span style="font-size:16px;font-weight:600;color:var(--color-text-primary);">Edit Session</span>
        <button onclick="closeModal()" style="background:transparent;border:none;cursor:pointer;color:var(--color-text-secondary);font-size:18px;line-height:1;"><i class="ti ti-x" aria-hidden="true"></i></button>
      </div>
      <div class="modal-body">
        <div style="margin-bottom:12px;">
          <div class="inp-label">Date</div>
          <input type="text" value="${sess?`Sat ${sess.date.replace('2026-','').replace(/-/g,'/')}`:''}" placeholder="Sat May 16, 2026" style="width:100%;font-size:13px;font-family:var(--font-mono);">
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">
          <span class="pill-tag" style="background:var(--color-background-secondary);color:var(--color-text-secondary);">Week 14</span>
          <span class="pill-tag" style="background:var(--color-background-secondary);color:var(--color-text-secondary);">${sess?sess.day.toUpperCase():'SATURDAY'}</span>
          <span class="pill-tag" style="background:hsl(214,55%,22%);color:hsl(214,65%,72%);">Intensification II</span>
        </div>
        <div style="font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px;">Planned Exercises</div>
        <div id="modal-ex-list" style="max-height:300px;overflow-y:auto;margin-bottom:10px;">
          ${rows||'<div style="font-size:12px;color:var(--color-text-secondary);padding:8px 0;">No exercises. Add below.</div>'}
        </div>
        <div class="search-wrap">
          <input id="ex-search-inp" type="text" placeholder="Search exercises to add..." style="width:100%;font-size:13px;" oninput="filterDD(this.value)" onkeydown="if(event.key==='Enter'){addRowFromSearch();}">
          <div id="ex-dd" class="search-dd"></div>
        </div>
        <div style="font-size:11px;color:var(--color-text-secondary);margin-top:5px;">Select an exercise from the dropdown to add it.</div>
      </div>
      <div class="modal-foot">
        <button class="btn" style="color:var(--color-text-danger);border:0.5px solid var(--color-border-danger);background:transparent;"><i class="ti ti-trash" aria-hidden="true"></i> Delete Session</button>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="closeModal()"><i class="ti ti-device-floppy" aria-hidden="true"></i> Update Session</button>
        </div>
      </div>
    </div>
  </div>`;
}

renderVol();
renderGrid();
</script>
