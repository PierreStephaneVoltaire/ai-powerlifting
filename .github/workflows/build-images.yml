name: Build & Push Powerlifting Images

on:
  push:
    branches: [master, main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "packages/**"
      - "lambda/**"
      - "docker/**"
      - "terraform/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/build-images.yml"

  pull_request:
    branches: [master, main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "packages/**"
      - "docker/**"
      - "terraform/**"
      - ".github/workflows/build-images.yml"

  workflow_dispatch:
    inputs:
      image_tag:
        description: "Override image tag (default: branch name)"
        required: false
      backend_only:
        description: Build only backend
        required: false
        default: "false"
      frontend_only:
        description: Build only frontend
        required: false
        default: "false"
      apply_terraform:
        description: Run terraform apply (workflow_dispatch only)
        required: false
        default: "false"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ca-central-1
  ECR_REPO_PREFIX: if
  TF_VERSION: "1.15.x"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.result.outputs.backend }}
      frontend: ${{ steps.result.outputs.frontend }}
      functions: ${{ steps.result.outputs.functions }}
      terraform: ${{ steps.result.outputs.terraform }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'packages/**'
              - 'lambda/**'
              - 'docker/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - '.github/workflows/build-images.yml'
            frontend:
              - 'frontend/**'
              - 'packages/**'
              - 'docker/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - '.github/workflows/build-images.yml'
            functions:
              - 'lambda/**'
              - 'docker/powerlifting-fn.pkr.hcl'
              - '.github/workflows/build-images.yml'
            terraform:
              - 'terraform/**'
              - '.github/workflows/build-images.yml'

      - id: result
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            echo "functions=true" >> "$GITHUB_OUTPUT"
            echo "terraform=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=${{ steps.filter.outputs.backend }}" >> "$GITHUB_OUTPUT"
            echo "frontend=${{ steps.filter.outputs.frontend }}" >> "$GITHUB_OUTPUT"
            echo "functions=${{ steps.filter.outputs.functions }}" >> "$GITHUB_OUTPUT"
            echo "terraform=${{ steps.filter.outputs.terraform }}" >> "$GITHUB_OUTPUT"
          fi

  build-backend:
    needs: changes
    runs-on: ubuntu-latest
    if: ${{ needs.changes.outputs.backend == 'true' && !(github.event_name == 'workflow_dispatch' && inputs.frontend_only == 'true') }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to public ECR
        run: aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws

      - uses: hashicorp/setup-packer@v3
        with:
          version: 1.13.x

      - id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"

      - working-directory: docker
        run: packer init powerlifting-backend.pkr.hcl

      - working-directory: docker
        run: |
          packer build -color=false \
            -var "image_repository=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-powerlifting-app-backend" \
            -var "image_tag=${{ steps.tag.outputs.value }}" \
            powerlifting-backend.pkr.hcl

  build-frontend:
    needs: changes
    runs-on: ubuntu-latest
    if: ${{ needs.changes.outputs.frontend == 'true' && !(github.event_name == 'workflow_dispatch' && inputs.backend_only == 'true') }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to public ECR
        run: aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws

      # Read the CloudFront media base URL from the terraform remote state so
      # the frontend build can bake it into the CSP media-src allowlist. The
      # state already reflects the applied CloudFront distribution from prior
      # terraform runs, so this does not require a fresh apply in this run.
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Read CloudFront media base URL from terraform output
        id: tfout
        working-directory: terraform
        run: |
          terraform init -input=false
          MEDIA_URL=$(terraform output -raw cloudfront_media_base_url)
          echo "cloudfront_media_base_url=$MEDIA_URL" >> "$GITHUB_OUTPUT"

      - uses: hashicorp/setup-packer@v3
        with:
          version: 1.13.x

      - id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"

      - working-directory: docker
        run: packer init powerlifting-frontend.pkr.hcl

      - working-directory: docker
        run: |
          packer build -color=false \
            -var "image_repository=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-powerlifting-app-frontend" \
            -var "image_tag=${{ steps.tag.outputs.value }}" \
            -var "api_url=/api" \
            -var "cloudfront_media_base_url=${{ steps.tfout.outputs.cloudfront_media_base_url }}" \
            powerlifting-frontend.pkr.hcl

  build-functions:
    needs: changes
    runs-on: ubuntu-latest
    if: ${{ needs.changes.outputs.functions == 'true' && !(github.event_name == 'workflow_dispatch' && inputs.backend_only == 'true') && !(github.event_name == 'workflow_dispatch' && inputs.frontend_only == 'true') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - run: pip install pyyaml

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to public ECR
        run: aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws

      - uses: hashicorp/setup-packer@v3
        with:
          version: 1.13.x

      - name: Build source zips
        working-directory: lambda
        run: python3 fission-deploy.py

      - name: Detect changed or missing functions
        id: changed
        working-directory: terraform/fission-build
        env:
          ECR_REPO: ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-powerlifting-fns
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          CHANGED=""
          for zip in *.zip; do
            tool_id="${zip%.zip}"
            CURRENT_SHA=$(sha256sum "$zip" | cut -d' ' -f1)
            PREV_SHA=$(git show HEAD~1:terraform/fission-build/"$zip" 2>/dev/null | sha256sum | cut -d' ' -f1 || echo "")
            if [ "$CURRENT_SHA" != "$PREV_SHA" ]; then
              CHANGED="$CHANGED $tool_id"
              continue
            fi
            IMAGE_EXISTS=$(aws ecr describe-images \
              --repository-name "$(echo "$ECR_REPO" | cut -d'/' -f2-)" \
              --region "$AWS_REGION" \
              --image-ids imageTag="$tool_id" \
              --query 'imageDetails[0].imageTags[0]' \
              --output text 2>/dev/null || echo "")
            if [ "$IMAGE_EXISTS" != "$tool_id" ]; then
              CHANGED="$CHANGED $tool_id"
            fi
          done
          CHANGED=$(echo "$CHANGED" | xargs)
          echo "tools=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "Functions to build: $CHANGED"

      - name: Build and push function images
        if: ${{ steps.changed.outputs.tools != '' }}
        working-directory: docker
        run: |
          for tool_id in ${{ steps.changed.outputs.tools }}; do
            echo "Building $tool_id..."
            packer init powerlifting-fn.pkr.hcl
            packer build -color=false \
              -var "image_repository=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-powerlifting-fns" \
              -var "image_tag=${tool_id}" \
              -var "tool_id=${tool_id}" \
              -var "source_archive=../terraform/fission-build/${tool_id}.zip" \
              powerlifting-fn.pkr.hcl
          done

  terraform-validate:
    needs: changes
    runs-on: ubuntu-latest
    if: ${{ needs.changes.outputs.terraform == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - working-directory: terraform
        run: terraform init -input=false

      - working-directory: terraform
        run: terraform validate

  terraform-plan:
    needs: terraform-validate
    runs-on: ubuntu-latest
    if: ${{ needs.terraform-validate.result == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - working-directory: terraform
        run: terraform init -input=false

      - working-directory: terraform
        run: terraform plan -input=false -no-color -var="region=${{ env.AWS_REGION }}"

  terraform-apply:
    needs: terraform-plan
    runs-on: ubuntu-latest
    if: ${{ needs.terraform-plan.result == 'success' && ((github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) || (github.event_name == 'workflow_dispatch' && inputs.apply_terraform == 'true')) }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - working-directory: terraform
        run: terraform init -input=false

      - working-directory: terraform
        run: terraform apply -input=false -no-color -auto-approve -var="region=${{ env.AWS_REGION }}"
