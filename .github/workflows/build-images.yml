name: Build & Push Powerlifting Images

on:
  push:
    branches: [master, main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "packages/**"
      - "lambda/**"
      - "docker/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/build-images.yml"

  pull_request:
    branches: [master, main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "packages/**"
      - "docker/**"
      - ".github/workflows/build-images.yml"

  workflow_dispatch:
    inputs:
      image_tag:
        description: Override image tag (default: short git SHA)
        required: false

      backend_only:
        description: Build only backend
        required: false
        default: "false"

      frontend_only:
        description: Build only frontend
        required: false
        default: "false"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ca-central-1
  ECR_REPO_PREFIX: if

jobs:
  build-backend:
    runs-on: ubuntu-latest

    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.frontend_only == 'true') }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: hashicorp/setup-packer@v3
        with:
          version: 1.13.x

      - id: tags
        shell: bash
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            SHA_TAG="${{ inputs.image_tag }}"
          else
            SHA_TAG="${GITHUB_SHA::7}"
          fi

          BRANCH_TAG=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')

          if [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" == "master" ]]; then
            IMAGE_TAGS="[\"${SHA_TAG}\",\"${BRANCH_TAG}\",\"latest\"]"
          else
            IMAGE_TAGS="[\"${SHA_TAG}\",\"${BRANCH_TAG}\"]"
          fi

          echo "image_tags=${IMAGE_TAGS}" >> "$GITHUB_OUTPUT"

      - working-directory: docker
        run: packer init powerlifting-backend.pkr.hcl

      - working-directory: docker
        run: |
          packer build -color=false \
            -var "image_repository=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-powerlifting-app-backend" \
            -var 'image_tags=${{ steps.tags.outputs.image_tags }}' \
            powerlifting-backend.pkr.hcl

  build-frontend:
    runs-on: ubuntu-latest

    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.backend_only == 'true') }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: hashicorp/setup-packer@v3
        with:
          version: 1.13.x

      - id: tags
        shell: bash
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            SHA_TAG="${{ inputs.image_tag }}"
          else
            SHA_TAG="${GITHUB_SHA::7}"
          fi

          BRANCH_TAG=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')

          if [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" == "master" ]]; then
            IMAGE_TAGS="[\"${SHA_TAG}\",\"${BRANCH_TAG}\",\"latest\"]"
          else
            IMAGE_TAGS="[\"${SHA_TAG}\",\"${BRANCH_TAG}\"]"
          fi

          echo "image_tags=${IMAGE_TAGS}" >> "$GITHUB_OUTPUT"

      - working-directory: docker
        run: packer init powerlifting-frontend.pkr.hcl

      - working-directory: docker
        run: |
          packer build -color=false \
            -var "image_repository=${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO_PREFIX }}-powerlifting-app-frontend" \
            -var 'image_tags=${{ steps.tags.outputs.image_tags }}' \
            -var "api_url=/api" \
            powerlifting-frontend.pkr.hcl
