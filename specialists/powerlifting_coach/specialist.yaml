description: >
  Use powerlifting_coach for any training-related read-only query or coaching
  advice. This is the read-only counterpart to health_write — use this specialist
  for fetching and analyzing program state, not for mutations.

  Capabilities: retrieve the current training program, sessions (single or date
  range), program metadata, training phases, current maxes, operator preferences,
  scheduled breaks, competition countdown, competition details, diet notes,
  supplement protocol, and IPF rulebook RAG search. Also provides unit conversions
  (kg/lb), weight class lookups, percentage-of-max calculations, attempt weight
  calculators, date math, weekly training analysis, exercise ROI correlation analysis,
  fatigue profile estimation, and full-block program evaluation by sports scientist AI.

  Use for: exercise selection guidance, volume/intensity analysis, periodization
  questions, competition readiness assessment, peaking strategy, deload timing,
  attempt selection, RPE interpretation, weak point analysis, training history
  review, full-block program evaluation, and any "should I..." or "what's my..."
  training question.

  Do NOT use for program mutations — hand off to health_write when a write is
  needed (logging a session, updating body weight, recording RPE, changing attempt
  targets, updating supplements, etc.).
preset: "health"
tools:
  - health_get_program
  - health_get_session
  - health_get_sessions_range
  - health_get_meta
  - health_get_phases
  - health_get_current_maxes
  - health_get_operator_prefs
  - health_get_breaks
  - health_comp_countdown
  - health_get_competition
  - health_list_competitions
  - health_get_diet_notes
  - health_get_supplements
  - health_rag_search
  - get_current_date
  - kg_to_lb
  - lb_to_kg
  - ipf_weight_classes
  - pct_of_max
  - calculate_attempts
  - days_until
  - weekly_analysis
  - correlation_analysis
  - fatigue_profile_estimate
  - program_evaluation
  - get_analysis_markdown
  - regenerate_analysis
  # New Template Tools (Read-only for coach)
  - template_list
  - template_get
  - template_evaluate
mcp_servers: []
directive_types:
  - health
  - competition
context_builder: "agent.specialist_context.powerlifting_coach:build_context"
