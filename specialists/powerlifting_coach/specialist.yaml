description: >
  Use powerlifting_coach for training-related queries, coaching advice, and
  health program actions. This specialist may read and write the health program
  through the scoped health MCP tools.

  Capabilities: retrieve the current training program, sessions (single or date
  range), program metadata, training phases, current maxes, operator preferences,
  scheduled breaks, competition countdown, competition details, diet notes,
  supplement protocol, and IPF rulebook RAG search. Also provides unit conversions
  (kg/lb), weight class lookups, percentage-of-max calculations, attempt weight
  calculators, date math, weekly training analysis, exercise ROI correlation analysis,
  fatigue profile estimation, and full-block program evaluation by sports scientist AI.

  Use for: exercise selection guidance, volume/intensity analysis, periodization
  questions, competition readiness assessment, peaking strategy, deload timing,
  attempt selection, RPE interpretation, weak point analysis, training history
  review, full-block program evaluation, and any "should I..." or "what's my..."
  training question.

  It may mutate health data when the operator explicitly asks to log, update,
  reschedule, create, delete, import, apply, or save training/program state.
