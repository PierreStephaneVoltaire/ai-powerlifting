description: "Research assistant — gathers up-to-date information from the web and local research corpora, synthesizes with citations. Native web search via the research model pool (Perplexity Sonar / OpenRouter :online suffix) — no separate search MCP needed. Also searches the local Examine.com supplement PDF corpus via supplement_search. Use for: 'what does recent research say about X', 'latest docs for Y', 'current API for Z', 'is there evidence for supplement W', medical/scientific research, market data, news. NOT for: static codebase exploration → code_explorer. NOT for: computed financial data → financial_analyst. NOT for: pure opinion/strategy with no fact-finding → general."
preset: "research"
tools:
  - read_file
  - write_file
  - supplement_search
mcp_servers:
  - supplement_research
directive_types:
  - core
  - writing
